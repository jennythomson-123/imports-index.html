<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crude flow change dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; font-size: 14px; }
.topbar { background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.12); padding: 13px 24px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.topbar h1 { font-size: 15px; font-weight: 500; flex: 1; min-width: 180px; }
.period-label { font-size: 11px; color: #aaa; font-weight: 400; }
.upload-btn { position: relative; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; padding: 7px 13px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.22); background: #fff; color: #1a1a1a; cursor: pointer; font-family: inherit; }
.upload-btn:hover { background: #f5f5f0; }
.upload-btn input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
.status { font-size: 11px; color: #aaa; }
.status.ok  { color: #1D9E75; font-weight: 500; }
.status.err { color: #E24B4A; font-weight: 500; }
.tabs-bar { display: flex; background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.12); padding: 0 24px; overflow-x: auto; }
.tab { padding: 10px 18px; font-size: 12px; cursor: pointer; border: none; border-bottom: 2px solid transparent; color: #888; background: none; font-family: inherit; white-space: nowrap; }
.tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 500; }
.tab:hover:not(.active) { color: #444; }
.panel { display: none; padding: 20px 24px; }
.panel.active { display: block; }
.col-info { font-size: 11px; color: #666; background: #fff; border: 0.5px solid rgba(0,0,0,0.08); border-radius: 7px; padding: 9px 14px; margin-bottom: 14px; line-height: 2; display: none; }
.col-info strong { color: #1a1a1a; }
.col-pill { display: inline-block; background: #f0efe8; border-radius: 20px; padding: 1px 8px; font-size: 10px; color: #555; margin: 0 2px; }
.row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
.stat-card { background: #fff; border-radius: 8px; padding: 10px 14px; flex: 1; min-width: 105px; border: 0.5px solid rgba(0,0,0,0.08); }
.stat-card .lbl { font-size: 11px; color: #888; margin-bottom: 2px; }
.stat-card .val { font-size: 18px; font-weight: 500; }
.controls { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.controls .lbl { font-size: 12px; color: #666; }
select { font-size: 12px; padding: 5px 9px; border-radius: 7px; border: 0.5px solid rgba(0,0,0,0.22); background: #fff; color: #1a1a1a; font-family: inherit; cursor: pointer; }
.rtabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
.rtab { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 0.5px solid rgba(0,0,0,0.18); background: #fff; color: #666; cursor: pointer; font-family: inherit; transition: all 0.12s; }
.gran-toggle { display: flex; border: 0.5px solid rgba(0,0,0,0.18); border-radius: 8px; overflow: hidden; width: fit-content; }
.gtab { font-size: 11px; padding: 5px 14px; background: #fff; border: none; color: #888; cursor: pointer; font-family: inherit; }
.gtab.active { background: #1a1a1a; color: #fff; font-weight: 500; }
.legend { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 10px; }
.legend span { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #666; }
.sw { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
.chart-wrap { position: relative; width: 100%; }
.note { font-size: 11px; color: #bbb; margin-top: 10px; border-top: 0.5px solid rgba(0,0,0,0.07); padding-top: 8px; }
#b-tooltip { display:none; position:absolute; background:#fff; border:0.5px solid rgba(0,0,0,0.15); border-radius:8px; padding:9px 13px; font-size:12px; pointer-events:none; z-index:10; max-width:240px; box-shadow:0 2px 8px rgba(0,0,0,0.07); }
</style>
</head>
<body>
<div class="topbar">
  <h1>Crude export flow dashboard <span class="period-label" id="period-lbl"></span></h1>
  <label class="upload-btn">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M4 5l4-4 4 4M2 12v2h12v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Upload Excel
    <input type="file" accept=".xlsx,.xls,.csv" id="file-input">
  </label>
  <span class="status" id="status-msg">Loading data…</span>
</div>
<div class="tabs-bar">
  <button class="tab active" onclick="switchTab('bubble',this)">Bubble scatter — volume by corridor</button>
  <button class="tab" onclick="switchTab('diverging',this)">Diverging bars — m-o-m change</button>
  <button class="tab" onclick="switchTab('waterfall',this)">Waterfall — by import region</button>
</div>

<div class="panel active" id="panel-bubble">
  <div class="col-info" id="b-col-info"></div>
  <div class="row" id="b-stats"></div>
  <div class="controls">
    <span class="lbl">Export region:</span>
    <select id="b-ex-region"><option value="all">All</option></select>
    <span class="lbl">Import region:</span>
    <select id="b-im-region"><option value="all">All</option></select>
  </div>
  <div class="gran-toggle" style="margin-bottom:12px;">
    <button class="gtab active" id="b-gran-region"  onclick="setBubbleGran('region')">By region</button>
    <button class="gtab"        id="b-gran-country" onclick="setBubbleGran('country')">By country</button>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;" id="b-legend"></div>
  <div class="chart-wrap" style="height:520px;">
    <canvas id="bubbleChart" role="img" aria-label="Bubble scatter of crude export corridors."></canvas>
  </div>
  <div id="b-tooltip"></div>
  <div class="legend" style="margin-top:10px;">
    <span style="color:#bbb;">Bubbles coloured by export region — labels show import region/country — bubble size = |m-o-m|</span>
  </div>
  <p class="note" id="b-note"></p>
</div>

<div class="panel" id="panel-diverging">
  <div class="col-info" id="d-col-info"></div>
  <div class="gran-toggle" style="margin-bottom:12px;">
    <button class="gtab active" id="d-gran-region"  onclick="setDivGran('region')">By region</button>
    <button class="gtab"        id="d-gran-country" onclick="setDivGran('country')">By country</button>
  </div>
  <div class="rtabs" id="d-region-tabs"></div>
  <div class="row" id="d-stats"></div>
  <div class="controls">
    <span class="lbl">View:</span>
    <div class="gran-toggle">
      <button class="gtab active" id="d-view-mom"    onclick="setDivView('mom')">m-o-m (col 7)</button>
      <button class="gtab"        id="d-view-vs2025" onclick="setDivView('vs2025')">vs 2025 avg (col 9)</button>
    </div>
    <span id="d-view-desc" style="font-size:11px;color:#aaa;"></span>
  </div>
  <div class="chart-wrap" id="d-chart-wrap" style="height:400px;">
    <canvas id="divChart" role="img" aria-label="Diverging horizontal bar chart of crude flow changes."></canvas>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;" id="d-legend-row"></div>
  <p class="note" id="d-note"></p>
</div>

<div class="panel" id="panel-waterfall">
  <div class="col-info" id="w-col-info"></div>
  <div class="controls" style="align-items:flex-start;flex-direction:column;gap:6px;">
    <span class="lbl">Import region:</span>
    <div class="rtabs" id="w-im-tabs" style="margin-bottom:0;"></div>
  </div>
  <div class="controls">
    <span class="lbl">View:</span>
    <div class="gran-toggle">
      <button class="gtab active" id="w-view-vs2025" onclick="setWaterfallView('vs2025')">vs 2025 avg (col 9)</button>
      <button class="gtab"        id="w-view-mom"    onclick="setWaterfallView('mom')">m-o-m (col 7)</button>
    </div>
    <span id="w-view-desc" style="font-size:11px;color:#aaa;"></span>
  </div>
  <div class="row" id="w-stats"></div>
  <div class="chart-wrap" id="w-chart-wrap" style="height:420px;">
    <canvas id="wfChart" role="img" aria-label="Waterfall chart of crude import changes by export region source."></canvas>
  </div>
  <div class="legend">
    <span><span class="sw" style="background:#222;"></span>Base (<span id="w-base-label">prior month</span>)</span>
    <span style="color:#666;">Steps coloured by export region</span>
    <span><span class="sw" style="background:#222;"></span><span id="w-final-label">Current month total</span></span>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;" id="w-legend-row"></div>
  <p class="note" id="w-note"></p>
</div>

<script>
const REGION_COLORS={
  "Africa":"#02889E","Eurasia":"#644875","Middle East":"#FFBD02",
  "NON-OECD Americas":"#01A93E","OECD Americas":"#81CFE1",
  "OECD Asia Oceania":"#EA7B1A","OECD Europe":"#D14648",
  "Other Asia":"#B59FCA","Unknown Origin":"#7F7F7F","Unknown":"#BFBFBF"
};
const PALETTE=["#02889E","#644875","#FFBD02","#01A93E","#81CFE1","#EA7B1A","#D14648","#B59FCA","#7F7F7F","#BFBFBF","#02889E","#644875"];
const _xc={};
function rColor(r){if(REGION_COLORS[r])return REGION_COLORS[r];if(!_xc[r])_xc[r]=PALETTE[Object.keys(_xc).length%PALETTE.length];return _xc[r];}
const fmtKbd=v=>(v>0?'+':'')+Math.round(v).toLocaleString()+' kb/d';

const S={month1:'Feb 2026',month2:'Mar 2026',rows:[],aggRegion:[],aggCountry:[],exRegions:[],imRegions:[],exCountries:[],activeKey:'Middle East',activeImKey:'Other Asia',bubbleGran:'region',divGran:'region',divView:'mom',wfView:'vs2025'};
let bChart=null,dChart=null,wChart=null;
const COL={exRegion:0,exCountry:1,imRegion:2,imCountry:3,vol1:4,vol2:5,mom:6,avg2025:7,vsAvg:8};

function parseDateLabel(raw){
  if(!raw&&raw!==0)return '';
  if(typeof raw==='number'&&raw>40000){try{const d=XLSX.SSF.parse_date_code(raw);return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.m-1]+' '+d.y;}catch(e){}}
  const s=String(raw).trim();const m=s.match(/(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})/);
  if(m){const mon=parseInt(m[2],10);if(mon>=1&&mon<=12)return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mon-1]+' '+m[3];}
  return s;
}

function processRawData(buf,filename){
  const wb=XLSX.read(buf,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];
  const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  let hi=-1;for(let i=0;i<Math.min(15,raw.length);i++){if(raw[i].some(c=>String(c||'').trim().toUpperCase()==='EX_REGION')){hi=i;break;}}
  if(hi<0){setStatus('Header row not found.','err');return;}
  const headers=raw[hi].map(c=>String(c||'').trim());
  if(headers.length<9){setStatus(`Only ${headers.length} columns.`,'err');return;}
  const m1=parseDateLabel(headers[COL.vol1]),m2=parseDateLabel(headers[COL.vol2]);
  const vsLbl=headers[COL.vsAvg]||'vs 2025',avgLbl=headers[COL.avg2025]||'2025 Average';
  const parsed=[];
  for(let i=hi+1;i<raw.length;i++){
    const r=raw[i];const exR=String(r[COL.exRegion]||'').trim();const imR=String(r[COL.imRegion]||'').trim();
    if(!exR||exR.toUpperCase()==='EX_REGION'||!imR)continue;
    parsed.push({exRegion:exR,exCountry:String(r[COL.exCountry]||'').trim()||exR,imRegion:imR,imCountry:String(r[COL.imCountry]||'').trim()||imR,vol1:parseFloat(r[COL.vol1])||0,vol2:parseFloat(r[COL.vol2])||0,mom:parseFloat(r[COL.mom])||0,avg2025:parseFloat(r[COL.avg2025])||0,vsAvg:parseFloat(r[COL.vsAvg])||0});
  }
  if(parsed.length===0){setStatus('No data rows found.','err');return;}
  const info=`<strong>Columns detected:</strong> <span class="col-pill">col5=${m1}</span><span class="col-pill">col6=${m2}</span><span class="col-pill">col7=m-o-m</span><span class="col-pill">col8=${avgLbl}</span><span class="col-pill">col9=${vsLbl}</span> &nbsp;${parsed.length} rows`;
  ['b-col-info','d-col-info','w-col-info'].forEach(id=>{document.getElementById(id).innerHTML=info;document.getElementById(id).style.display='block';});
  S.month1=m1||'Prior month';S.month2=m2||'Current month';
  document.getElementById('period-lbl').textContent=`— ${S.month1} vs ${S.month2}`;
  setStatus(`Loaded: ${filename} — ${parsed.length} rows`,'ok');
  destroyAll();initData(parsed);
}

document.getElementById('file-input').addEventListener('change',function(e){
  const file=e.target.files&&e.target.files[0];if(!file)return;
  setStatus('Reading…','');const reader=new FileReader();
  reader.onload=function(ev){try{processRawData(ev.target.result,file.name);}catch(err){setStatus('Error: '+err.message,'err');console.error(err);}};
  reader.readAsArrayBuffer(file);
});

function setStatus(msg,type){const el=document.getElementById('status-msg');el.textContent=msg;el.className='status'+(type?' '+type:'');}
function destroyAll(){if(bChart){bChart.destroy();bChart=null;}if(dChart){dChart.destroy();dChart=null;}if(wChart){wChart.destroy();wChart=null;}}

function aggBy(rows,keyFn){
  const map={};
  rows.forEach(d=>{const k=keyFn(d);if(!map[k])map[k]={ex:k.split('|||')[0],im:k.split('|||')[1],vol1:0,vol2:0,mom:0,avg2025:0,vsAvg:0};map[k].vol1+=d.vol1;map[k].vol2+=d.vol2;map[k].mom+=d.mom;map[k].avg2025+=d.avg2025;map[k].vsAvg+=d.vsAvg;});
  return Object.values(map);
}

function initData(rows){
  S.rows=rows;S.aggRegion=aggBy(rows,d=>d.exRegion+'|||'+d.imRegion);S.aggCountry=aggBy(rows,d=>d.exCountry+'|||'+d.imCountry);
  S.exRegions=[...new Set(rows.map(d=>d.exRegion))].sort();S.imRegions=[...new Set(rows.map(d=>d.imRegion))].sort();S.exCountries=[...new Set(rows.map(d=>d.exCountry))].sort();
  if(!S.exRegions.includes(S.activeKey))S.activeKey=S.exRegions[0]||'';
  if(!S.imRegions.includes(S.activeImKey))S.activeImKey=S.imRegions[0]||'';
  buildBubbleControls();buildDivTabs();buildWaterfallTabs();
  buildRegionLegend('w-legend-row',S.exRegions);
  updateBubble();renderDivAll();renderWaterfall();
}

function switchTab(name,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));el.classList.add('active');document.getElementById('panel-'+name).classList.add('active');}

function buildRegionLegend(elId,regions){
  const el=document.getElementById(elId);if(!el)return;el.innerHTML='';
  regions.forEach(r=>{const s=document.createElement('span');s.style.cssText='display:flex;align-items:center;gap:4px;font-size:11px;color:#666;';s.innerHTML=`<span style="width:9px;height:9px;border-radius:2px;background:${rColor(r)};display:inline-block;"></span>${r}`;el.appendChild(s);});
}

/* ── BUBBLE ── */
function buildBubbleControls(){
  ['b-ex-region','b-im-region'].forEach((id,idx)=>{
    const sel=document.getElementById(id);sel.innerHTML=`<option value="all">All ${idx?'import':'export'} regions</option>`;
    (idx?S.imRegions:S.exRegions).forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;sel.appendChild(o);});sel.onchange=updateBubble;
  });
  const leg=document.getElementById('b-legend');leg.innerHTML='';
  S.exRegions.forEach(r=>{const s=document.createElement('span');s.style.cssText='display:flex;align-items:center;gap:4px;font-size:11px;color:#666;cursor:pointer;';s.innerHTML=`<span style="width:9px;height:9px;border-radius:50%;background:${rColor(r)};display:inline-block;opacity:0.9;"></span>${r}`;s.onclick=()=>{document.getElementById('b-ex-region').value=r;updateBubble();};leg.appendChild(s);});
}
function setBubbleGran(g){S.bubbleGran=g;document.getElementById('b-gran-region').classList.toggle('active',g==='region');document.getElementById('b-gran-country').classList.toggle('active',g==='country');if(bChart){bChart.destroy();bChart=null;}updateBubble();}
function updateBubble(){
  const exF=document.getElementById('b-ex-region').value,imF=document.getElementById('b-im-region').value,isCtry=S.bubbleGran==='country';
  let data=isCtry?S.aggCountry:S.aggRegion;
  if(exF!=='all'){if(isCtry){const ok=new Set(S.rows.filter(d=>d.exRegion===exF).map(d=>d.exCountry));data=data.filter(d=>ok.has(d.ex));}else data=data.filter(d=>d.ex===exF);}
  if(imF!=='all'){if(isCtry){const ok=new Set(S.rows.filter(d=>d.imRegion===imF).map(d=>d.imCountry));data=data.filter(d=>ok.has(d.im));}else data=data.filter(d=>d.im===imF);}
  const tv1=data.reduce((s,d)=>s+d.vol1,0),tv2=data.reduce((s,d)=>s+d.vol2,0),totMom=data.reduce((s,d)=>s+d.mom,0),totAvg=data.reduce((s,d)=>s+d.avg2025,0),totVsAvg=data.reduce((s,d)=>s+d.vsAvg,0),shrink=data.filter(d=>d.mom<0).length;
  document.getElementById('b-stats').innerHTML=`<div class="stat-card"><div class="lbl">${S.month1} total (col 5)</div><div class="val">${Math.round(tv1).toLocaleString()} kb/d</div></div><div class="stat-card"><div class="lbl">${S.month2} total (col 6)</div><div class="val">${Math.round(tv2).toLocaleString()} kb/d</div></div><div class="stat-card"><div class="lbl">m-o-m (col 7)</div><div class="val" style="color:${totMom<0?'#E24B4A':'#1D9E75'}">${fmtKbd(totMom)}</div></div><div class="stat-card"><div class="lbl">2025 avg (col 8)</div><div class="val">${Math.round(totAvg).toLocaleString()} kb/d</div></div><div class="stat-card"><div class="lbl">vs 2025 avg (col 9)</div><div class="val" style="color:${totVsAvg<0?'#E24B4A':'#1D9E75'}">${fmtKbd(totVsAvg)}</div></div><div class="stat-card"><div class="lbl">Corridors shrinking</div><div class="val">${shrink} / ${data.length}</div></div>`;
  document.getElementById('b-note').textContent=`${isCtry?'Country':'Region'}-level corridors. X=${S.month1}, Y=${S.month2}. Bubble size=|m-o-m|.`;
  const maxV=Math.max(...data.map(d=>Math.max(d.vol1,d.vol2)),100),pad=maxV*0.1;
  const ckMap={};if(isCtry)S.rows.forEach(d=>{ckMap[d.exCountry]=d.exRegion;});
  const byColor={};data.forEach(d=>{const ck=isCtry?(ckMap[d.ex]||d.ex):d.ex;if(!byColor[ck])byColor[ck]=[];byColor[ck].push(d);});
  const datasets=Object.entries(byColor).map(([ck,pts])=>({label:ck,data:pts.map(d=>({x:Math.round(d.vol1),y:Math.round(d.vol2),r:Math.max(3,Math.sqrt(Math.abs(d.mom))*0.85),_d:d})),backgroundColor:rColor(ck)+'aa',borderColor:rColor(ck),borderWidth:1}));
  const ctx=document.getElementById('bubbleChart').getContext('2d');
  if(bChart){bChart.data.datasets=datasets;bChart.options.scales.x.min=-pad;bChart.options.scales.x.max=maxV+pad;bChart.options.scales.y.min=-pad;bChart.options.scales.y.max=maxV+pad;bChart.options.scales.x.title.text=S.month1+' (kb/d)';bChart.options.scales.y.title.text=S.month2+' (kb/d)';bChart.update();return;}
  bChart=new Chart(ctx,{type:'bubble',data:{datasets},options:{responsive:true,maintainAspectRatio:false,layout:{padding:16},plugins:{legend:{display:false},tooltip:{enabled:false,external(ctx2){const box=document.getElementById('b-tooltip');if(ctx2.tooltip.opacity===0){box.style.display='none';return;}const d=ctx2.tooltip.dataPoints[0].raw._d;box.innerHTML=`<div style="font-weight:500;font-size:13px;margin-bottom:6px;">${d.ex} → ${d.im}</div><div style="color:#888;margin-bottom:2px;">${S.month1}: <b>${Math.round(d.vol1).toLocaleString()} kb/d</b></div><div style="color:#888;margin-bottom:2px;">${S.month2}: <b>${Math.round(d.vol2).toLocaleString()} kb/d</b></div><div style="color:${d.mom<0?'#E24B4A':'#1D9E75'};font-weight:500;margin-top:4px;">m-o-m: ${fmtKbd(d.mom)}</div><div style="color:#aaa;font-size:11px;margin-top:2px;">vs 2025 avg: ${fmtKbd(d.vsAvg)}</div>`;box.style.display='block';box.style.left=(ctx2.tooltip.caretX+14)+'px';box.style.top=(ctx2.tooltip.caretY-10)+'px';}}},scales:{x:{min:-pad,max:maxV+pad,title:{display:true,text:S.month1+' (kb/d)',color:'#888',font:{size:11}},grid:{color:'rgba(136,135,128,0.12)'},ticks:{color:'#888',font:{size:10},callback:v=>v>=0?Math.round(v).toLocaleString():''}},y:{min:-pad,max:maxV+pad,title:{display:true,text:S.month2+' (kb/d)',color:'#888',font:{size:11}},grid:{color:'rgba(136,135,128,0.12)'},ticks:{color:'#888',font:{size:10},callback:v=>v>=0?Math.round(v).toLocaleString():''}}}},plugins:[{id:'diag',beforeDraw(ch){const{ctx:c,scales:{x,y}}=ch;c.save();c.strokeStyle='rgba(136,135,128,0.3)';c.lineWidth=1;c.setLineDash([5,4]);c.beginPath();c.moveTo(x.getPixelForValue(0),y.getPixelForValue(0));c.lineTo(x.getPixelForValue(x.max),y.getPixelForValue(x.max));c.stroke();c.setLineDash([]);c.fillStyle='rgba(136,135,128,0.45)';c.font='10px sans-serif';c.fillText('no change',x.getPixelForValue(x.max*0.72),y.getPixelForValue(x.max*0.78));c.restore();}},{id:'bubblelabels',afterDatasetsDraw(ch){const{ctx:c,scales:{x,y}}=ch;c.save();c.font='500 9px sans-serif';c.textAlign='left';c.textBaseline='middle';ch.data.datasets.forEach(ds=>{ds.data.forEach(pt=>{if(!pt._d)return;const xp=x.getPixelForValue(pt.x),yp=y.getPixelForValue(pt.y),r=pt.r||4;c.fillStyle='rgba(40,40,40,0.72)';c.fillText(pt._d.im,xp+r+3,yp);});});c.restore();}}]});
}

/* ── DIVERGING BARS ── */
function divKeys(){return S.divGran==='region'?S.exRegions:[...new Set(S.rows.map(d=>d.exCountry))].sort();}
function buildDivTabs(){const el=document.getElementById('d-region-tabs');el.innerHTML='';divKeys().forEach(k=>{const btn=document.createElement('button');btn.className='rtab';btn.textContent=k;btn.dataset.key=k;btn.onclick=()=>{S.activeKey=k;renderDivAll();};el.appendChild(btn);});}
function setDivGran(g){S.divGran=g;document.getElementById('d-gran-region').classList.toggle('active',g==='region');document.getElementById('d-gran-country').classList.toggle('active',g==='country');const keys=divKeys();if(!keys.includes(S.activeKey))S.activeKey=keys[0]||'';buildDivTabs();if(dChart){dChart.destroy();dChart=null;}renderDivAll();}
function setDivView(v){S.divView=v;document.getElementById('d-view-mom').classList.toggle('active',v==='mom');document.getElementById('d-view-vs2025').classList.toggle('active',v==='vs2025');if(dChart){dChart.destroy();dChart=null;}renderDivAll();}
function updateDivTabStyles(){document.querySelectorAll('#d-region-tabs .rtab').forEach(b=>{const active=b.dataset.key===S.activeKey;const c=rColor(S.divGran==='region'?S.activeKey:(S.rows.find(d=>d.exCountry===S.activeKey)||{}).exRegion||S.activeKey);b.style.background=active?c:'#fff';b.style.color=active?'#fff':'#666';b.style.borderColor=active?c:'rgba(0,0,0,0.18)';b.style.fontWeight=active?'500':'400';});}
function renderDivAll(){
  updateDivTabStyles();const isMom=S.divView==='mom';
  let rows;if(S.divGran==='region')rows=S.aggRegion.filter(d=>d.ex===S.activeKey);else rows=aggBy(S.rows.filter(d=>d.exCountry===S.activeKey),d=>d.exCountry+'|||'+d.imCountry);
  const totMom=rows.reduce((s,d)=>s+d.mom,0),totVsAvg=rows.reduce((s,d)=>s+d.vsAvg,0),totVol2=rows.reduce((s,d)=>s+d.vol2,0),totAvg=rows.reduce((s,d)=>s+d.avg2025,0);
  const nDown=rows.filter(d=>(isMom?d.mom:d.vsAvg)<0).length,nUp=rows.filter(d=>(isMom?d.mom:d.vsAvg)>0).length;
  document.getElementById('d-stats').innerHTML=`<div class="stat-card"><div class="lbl">m-o-m (${S.month2})</div><div class="val" style="color:${totMom<0?'#E24B4A':'#1D9E75'}">${fmtKbd(totMom)}</div></div><div class="stat-card"><div class="lbl">${S.month2} total</div><div class="val">${Math.round(totVol2).toLocaleString()} kb/d</div></div><div class="stat-card"><div class="lbl">2025 avg total</div><div class="val">${Math.round(totAvg).toLocaleString()} kb/d</div></div><div class="stat-card"><div class="lbl">vs 2025 avg</div><div class="val" style="color:${totVsAvg<0?'#E24B4A':'#1D9E75'}">${fmtKbd(totVsAvg)}</div></div><div class="stat-card"><div class="lbl">Corridors ${isMom?'declining':'below 2025'}</div><div class="val">${nDown}</div></div><div class="stat-card"><div class="lbl">Corridors ${isMom?'growing':'above 2025'}</div><div class="val" style="color:#1D9E75">${nUp}</div></div>`;
  const sorted=[...rows].sort((a,b)=>isMom?a.mom-b.mom:a.vsAvg-b.vsAvg);
  const labels=sorted.map(d=>d.im);
  const barData=sorted.map(d=>Math.round(isMom?d.mom:d.vsAvg));
  const barCol=sorted.map(d=>rColor(d.im)+'cc');
  const barBord=sorted.map(d=>rColor(d.im));
  buildRegionLegend('d-legend-row',[...new Set(sorted.map(d=>d.im))]);
  document.getElementById('d-note').textContent=isMom?`Bars = col 7 (m-o-m). Coloured by import region. Sorted largest decline → largest gain.`:`Bars = col 9 (vs 2025 avg). Coloured by import region. Sorted largest decline → largest gain.`;
  document.getElementById('d-view-desc').textContent=isMom?`${S.month1} → ${S.month2}`:`${S.month2} vs 2025 avg`;
  const h=Math.max(300,sorted.length*36+80);document.getElementById('d-chart-wrap').style.height=h+'px';
  const allV=barData,xMin=Math.min(...allV)*1.12,xMax=Math.max(...allV)*1.12+20;
  const datasets=[{label:isMom?'m-o-m':'vs 2025 avg',data:barData,backgroundColor:barCol,borderColor:barBord,borderWidth:1,borderRadius:3}];
  const ctx=document.getElementById('divChart').getContext('2d');
  if(dChart){dChart.data.labels=labels;dChart.data.datasets=datasets;dChart.options.scales.x.min=xMin;dChart.options.scales.x.max=xMax;dChart.update();return;}
  dChart=new Chart(ctx,{type:'bar',data:{labels,datasets},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,layout:{padding:{right:72}},plugins:{legend:{display:false},tooltip:{callbacks:{title:i=>i[0].label,label:i=>' '+(S.divView==='mom'?'m-o-m':'vs 2025')+': '+(i.raw>0?'+':'')+i.raw.toLocaleString()+' kb/d'}}},scales:{x:{min:xMin,max:xMax,grid:{color:'rgba(136,135,128,0.12)'},ticks:{color:'#888',font:{size:10},callback:v=>v.toLocaleString()},border:{display:false}},y:{grid:{display:false},ticks:{color:'#555',font:{size:11},autoSkip:false},border:{display:false}}}},plugins:[{id:'zero',afterDraw(ch){const{ctx:c,scales:{x,y}}=ch;const xz=x.getPixelForValue(0);c.save();c.strokeStyle='rgba(136,135,128,0.45)';c.lineWidth=1;c.beginPath();c.moveTo(xz,y.top);c.lineTo(xz,y.bottom);c.stroke();c.restore();}},{id:'lbl',afterDatasetsDraw(ch){const{ctx:c,scales:{x,y},data}=ch;const vals=data.datasets[0].data;c.save();c.font='500 10px sans-serif';c.textBaseline='middle';vals.forEach((v,i)=>{const yp=y.getPixelForValue(i),xp=x.getPixelForValue(v);c.fillStyle=v<0?'#4a1a1a':'#1a3a1a';c.textAlign=v<0?'right':'left';c.fillText((v>0?'+':'')+v.toLocaleString(),xp+(v<0?-4:4),yp);});c.restore();}}]});
}

/* ── WATERFALL ── */
function buildWaterfallTabs(){const el=document.getElementById('w-im-tabs');el.innerHTML='';S.imRegions.forEach(r=>{const btn=document.createElement('button');btn.className='rtab';btn.textContent=r;btn.dataset.key=r;btn.onclick=()=>{S.activeImKey=r;renderWaterfall();};el.appendChild(btn);});}
function updateWfTabStyles(){document.querySelectorAll('#w-im-tabs .rtab').forEach(b=>{const active=b.dataset.key===S.activeImKey;b.style.background=active?'#222':'#fff';b.style.color=active?'#fff':'#666';b.style.borderColor=active?'#222':'rgba(0,0,0,0.18)';b.style.fontWeight=active?'500':'400';});}
function setWaterfallView(v){
  S.wfView=v;document.getElementById('w-view-vs2025').classList.toggle('active',v==='vs2025');document.getElementById('w-view-mom').classList.toggle('active',v==='mom');
  const bl=document.getElementById('w-base-label'),fl=document.getElementById('w-final-label');
  if(bl)bl.textContent=v==='mom'?S.month1:'2025 avg';if(fl)fl.textContent=S.month2+' total';
  if(wChart){wChart.destroy();wChart=null;}renderWaterfall();
}
function renderWaterfall(){
  updateWfTabStyles();const imR=S.activeImKey,isMom=S.wfView==='mom';
  const imRows=S.rows.filter(d=>d.imRegion===imR);
  const base=isMom?imRows.reduce((s,d)=>s+d.vol1,0):imRows.reduce((s,d)=>s+d.avg2025,0);
  const final=imRows.reduce((s,d)=>s+d.vol2,0);
  const baseLabel=isMom?S.month1:'2025 avg';
  const stepMap={};imRows.forEach(d=>{if(!stepMap[d.exRegion])stepMap[d.exRegion]=0;stepMap[d.exRegion]+=isMom?d.mom:d.vsAvg;});
  const steps=Object.entries(stepMap).map(([ex,val])=>({ex,val:Math.round(val)})).sort((a,b)=>a.val-b.val);
  const totalChange=final-base,nPos=steps.filter(s=>s.val>0).length,nNeg=steps.filter(s=>s.val<0).length;
  document.getElementById('w-stats').innerHTML=`<div class="stat-card"><div class="lbl">${baseLabel} — ${imR}</div><div class="val">${Math.round(base).toLocaleString()} kb/d</div></div><div class="stat-card"><div class="lbl">${S.month2} total — ${imR}</div><div class="val">${Math.round(final).toLocaleString()} kb/d</div></div><div class="stat-card"><div class="lbl">Total change</div><div class="val" style="color:${totalChange<0?'#E24B4A':'#1D9E75'}">${fmtKbd(totalChange)}</div></div><div class="stat-card"><div class="lbl">EX regions adding</div><div class="val" style="color:#1D9E75">${nPos}</div></div><div class="stat-card"><div class="lbl">EX regions subtracting</div><div class="val" style="color:#E24B4A">${nNeg}</div></div>`;
  document.getElementById('w-view-desc').textContent=isMom?`Base=${S.month1} (col5). Steps=col7 per EX_REGION into ${imR}`:`Base=2025 avg (col8). Steps=col9 per EX_REGION into ${imR}`;
  document.getElementById('w-note').textContent=isMom?`Base=${S.month1} total. Steps=each EX_REGION m-o-m (col7). Final=${S.month2} total.`:`Base=2025 avg. Steps=each EX_REGION vs 2025 avg (col9). Final=${S.month2} total.`;

  const labels=[],floats=[],grays=[],posVals=[],negVals=[],posBg=[],negBg=[];
  labels.push(baseLabel);floats.push(0);grays.push(Math.round(base));posVals.push(0);negVals.push(0);posBg.push('rgba(0,0,0,0)');negBg.push('rgba(0,0,0,0)');
  let running=Math.round(base);
  steps.forEach(s=>{
    const col=rColor(s.ex)+'cc';
    labels.push(s.ex);floats.push(s.val>=0?running:running+s.val);grays.push(0);
    posVals.push(s.val>=0?s.val:0);negVals.push(s.val<0?Math.abs(s.val):0);
    posBg.push(s.val>=0?col:'rgba(0,0,0,0)');negBg.push(s.val<0?col:'rgba(0,0,0,0)');
    running+=s.val;
  });
  labels.push(S.month2);floats.push(0);grays.push(Math.round(final));posVals.push(0);negVals.push(0);posBg.push('rgba(0,0,0,0)');negBg.push('rgba(0,0,0,0)');

  const allY=[Math.round(base),Math.round(final)];let r2=Math.round(base);steps.forEach(s=>{allY.push(r2);r2+=s.val;allY.push(r2);});
  const yMin=Math.min(...allY)*0.93,yMax=Math.max(...allY)*1.06;
  const datasets=[
    {label:'_float',data:floats,backgroundColor:'rgba(0,0,0,0)',borderColor:'rgba(0,0,0,0)',stack:'wf'},
    {label:'Base/Final',data:grays,backgroundColor:'#222',borderColor:'#222',stack:'wf',borderRadius:3},
    {label:'Growth', data:posVals,backgroundColor:posBg,stack:'wf',borderRadius:3},
    {label:'Decline',data:negVals,backgroundColor:negBg,stack:'wf',borderRadius:3},
  ];
  const h=Math.max(400,(steps.length+2)*58+80);document.getElementById('w-chart-wrap').style.height=h+'px';
  const ctx=document.getElementById('wfChart').getContext('2d');
  if(wChart){wChart.data.labels=labels;wChart.data.datasets=datasets;wChart.options.scales.y.min=yMin;wChart.options.scales.y.max=yMax;wChart.update();return;}
  wChart=new Chart(ctx,{type:'bar',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:32}},plugins:{legend:{display:false},tooltip:{callbacks:{label(item){if(item.dataset.label==='_float')return null;if(item.dataset.label==='Base/Final')return ' total: '+Math.round(item.raw).toLocaleString()+' kb/d';const raw=item.dataset.label==='Decline'?-item.raw:item.raw;return ' '+(raw>0?'+':'')+Math.round(raw).toLocaleString()+' kb/d';},filter(item){return item.dataset.label!=='_float'&&item.raw!==0;}}}},scales:{x:{stacked:true,grid:{display:false},ticks:{color:'#555',font:{size:11}},border:{display:false}},y:{stacked:true,min:yMin,max:yMax,grid:{color:'rgba(136,135,128,0.12)'},ticks:{color:'#888',font:{size:10},callback:v=>Math.round(v).toLocaleString()},border:{display:false}}}},plugins:[{id:'wf-lbl',afterDatasetsDraw(chart){const{ctx:c,scales:{x,y},data}=chart;c.save();c.font='500 11px sans-serif';c.textBaseline='bottom';c.textAlign='center';const pD=data.datasets[2].data,nD=data.datasets[3].data,fD=data.datasets[0].data,grD=data.datasets[1].data;data.labels.forEach((lbl,i)=>{const xp=x.getPixelForValue(i);if(grD[i]>0){c.fillStyle='#333';c.fillText(Math.round(grD[i]).toLocaleString(),xp,y.getPixelForValue(grD[i])-4);return;}if(pD[i]>0){c.fillStyle='#1a3a1a';c.fillText('+'+Math.round(pD[i]).toLocaleString(),xp,y.getPixelForValue(fD[i]+pD[i])-4);}if(nD[i]>0){c.fillStyle='#4a1a1a';c.fillText('-'+Math.round(nD[i]).toLocaleString(),xp,y.getPixelForValue(fD[i])-4);}});c.restore();}}]});
}
